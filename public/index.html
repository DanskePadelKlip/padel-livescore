<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PadelTicker — live padel scores</title>
  <meta name="description" content="PadelTicker — live padel scores from around the world: Premier Padel, FIP, and national tours, all in one live feed." />
  <style>
    :root {
      --bg: #0e1014; --bg-2: #14171d; --card: #191d25; --card-hi: #1f2530;
      --line: #262c38; --line-hi: #333b4a;
      --text: #eef1f6; --muted: #9aa3b2; --faint: #6b7280;
      --live: #ff3b3b; --live-bg: rgba(255,59,59,.13);
      --up: #4d9bff; --up-bg: rgba(77,155,255,.13);
      --final: #7a8494; --final-bg: rgba(122,132,148,.16);
      --accent: #E5484A; --accent-2: #D13737;
      --win: #eef1f6; --shadow: 0 1px 3px rgba(0,0,0,.3);
      --flash: rgba(255,209,102,.28);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f6fa; --bg-2: #eef1f6; --card: #ffffff; --card-hi: #f7f9fc;
        --line: #e4e8ef; --line-hi: #d3d9e3;
        --text: #131720; --muted: #5a6472; --faint: #8b93a3;
        --final: #8b93a3; --final-bg: rgba(139,147,163,.14);
        --win: #131720; --shadow: 0 1px 3px rgba(20,30,50,.08);
      }
    }
    :root[data-theme="dark"] {
      --bg: #0e1014; --bg-2: #14171d; --card: #191d25; --card-hi: #1f2530;
      --line: #262c38; --line-hi: #333b4a; --text: #eef1f6; --muted: #9aa3b2;
      --faint: #6b7280; --final: #7a8494; --final-bg: rgba(122,132,148,.16);
      --win: #eef1f6; --shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    :root[data-theme="light"] {
      --bg: #f4f6fa; --bg-2: #eef1f6; --card: #ffffff; --card-hi: #f7f9fc;
      --line: #e4e8ef; --line-hi: #d3d9e3; --text: #131720; --muted: #5a6472;
      --faint: #8b93a3; --final: #8b93a3; --final-bg: rgba(139,147,163,.14);
      --win: #131720; --shadow: 0 1px 3px rgba(20,30,50,.08);
    }

    * { box-sizing: border-box; }
    html, body { overflow-x: hidden; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 15px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 820px; margin: 0 auto; padding: 0 14px; }

    /* ---- top bar ---- */
    header {
      position: sticky; top: 0; z-index: 20; background: var(--bg);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }
    .topbar { display: flex; align-items: center; gap: 12px; padding: 12px 0 10px; }
    .brand { font-size: 18px; font-weight: 800; letter-spacing: -.02em; display: flex; align-items: center; gap: 7px; }
    .brand small { font-weight: 600; color: var(--faint); font-size: 11px; letter-spacing: .04em; text-transform: uppercase; }
    .refresh { margin-left: auto; display: flex; align-items: center; gap: 7px; color: var(--muted); font-size: 12px; }
    .refresh .dot { width: 8px; height: 8px; border-radius: 50%; background: #3ecf7c; box-shadow: 0 0 0 0 rgba(62,207,124,.5); }
    .refresh.polling .dot { animation: ping 1.1s ease-out; }
    @keyframes ping { 0% { box-shadow: 0 0 0 0 rgba(62,207,124,.55); } 100% { box-shadow: 0 0 0 7px rgba(62,207,124,0); } }
    .theme-btn { background: var(--card); border: 1px solid var(--line); color: var(--muted); border-radius: 8px; width: 30px; height: 30px; cursor: pointer; font-size: 14px; }

    /* ---- controls ---- */
    .tabs { display: flex; gap: 6px; padding-bottom: 8px; }
    .tab { flex: 0 0 auto; background: var(--card); color: var(--text); border: 1px solid var(--line);
      padding: 6px 13px; border-radius: 999px; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .tab .pill { background: var(--live); color: #fff; border-radius: 999px; font-size: 10px; padding: 1px 6px; font-weight: 700; }
    .tab.active .pill { background: rgba(255,255,255,.25); }

    .row2 { display: flex; gap: 8px; padding-bottom: 10px; align-items: center; flex-wrap: wrap; }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip { background: var(--card); border: 1px solid var(--line); color: var(--muted); border-radius: 8px;
      padding: 4px 9px; cursor: pointer; font-size: 12px; font-weight: 700; letter-spacing: .02em; }
    .chip.active { background: var(--card-hi); border-color: var(--accent); color: var(--text); }
    .search { margin-left: auto; flex: 1 1 160px; min-width: 130px; }
    .search input { width: 100%; background: var(--card); border: 1px solid var(--line); color: var(--text);
      border-radius: 8px; padding: 7px 11px; font-size: 13px; outline: none; }
    .search input:focus { border-color: var(--line-hi); }

    /* ---- sections ---- */
    main { padding: 14px 0 70px; }
    .section-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted); margin: 18px 0 9px; display: flex; align-items: center; gap: 8px; }
    .section-label.live { color: var(--live); }
    .section-label .lampe { width: 8px; height: 8px; border-radius: 50%; background: var(--live); animation: blink 1.3s infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

    /* ---- tournament group ---- */
    .group { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 8px; overflow: hidden; background: var(--card); }
    .group__head { display: flex; align-items: center; gap: 10px; padding: 11px 13px; cursor: pointer; user-select: none; }
    .group__head:hover { background: var(--card-hi); }
    .flag { font-size: 11px; font-weight: 800; letter-spacing: .03em; color: var(--muted);
      background: var(--bg-2); border: 1px solid var(--line); border-radius: 6px; padding: 2px 6px; flex: 0 0 auto; }
    .group__title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1 1 auto; }
    .group__meta { display: flex; align-items: center; gap: 6px; flex: 0 0 auto; }
    .count { font-size: 11px; color: var(--faint); font-variant-numeric: tabular-nums; }
    .chev { color: var(--faint); transition: transform .18s; font-size: 12px; }
    .group.open .chev { transform: rotate(90deg); }
    .group__body { display: none; border-top: 1px solid var(--line); }
    .group.open .group__body { display: block; }

    /* ---- match row ---- */
    .morebtn { width: 100%; background: var(--card-hi); border: 0; border-top: 1px solid var(--line);
      color: var(--muted); padding: 9px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .morebtn:hover { color: var(--text); background: var(--card); }
    .match { border-bottom: 1px solid var(--line); }
    .match:last-child { border-bottom: 0; }
    .match__main { display: grid; grid-template-columns: 46px 1fr auto; gap: 10px; align-items: center; padding: 9px 13px; cursor: pointer; }
    .match__main:hover { background: var(--card-hi); }
    .match__state { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .badge { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; padding: 2px 6px; border-radius: 5px; white-space: nowrap; }
    .badge.live { background: var(--live-bg); color: var(--live); }
    .badge.upcoming { background: var(--up-bg); color: var(--up); }
    .badge.final { background: var(--final-bg); color: var(--final); }
    .match__state .t { font-size: 11px; color: var(--faint); font-variant-numeric: tabular-nums; }
    .match__state .lampe { width: 7px; height: 7px; border-radius: 50%; background: var(--live); animation: blink 1.3s infinite; }

    .teams { min-width: 0; display: grid; gap: 4px; }
    .team { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .team .nm { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
    .team.win .nm { font-weight: 700; color: var(--win); }
    .team.win .srv { color: var(--live); }
    .sets { margin-left: auto; display: flex; gap: 7px; font-variant-numeric: tabular-nums; }
    .sets b, .sets span { min-width: 11px; text-align: center; color: var(--muted); font-weight: 500; }
    .team.win .sets b, .team.win .sets span { color: var(--win); font-weight: 700; }
    .sets .flash { animation: flashcell 1.6s ease-out; border-radius: 4px; }
    @keyframes flashcell { 0% { background: var(--flash); } 100% { background: transparent; } }
    .vs { color: var(--faint); font-size: 12px; margin-left: auto; }

    /* ---- detail (expanded) ---- */
    .detail { display: none; padding: 4px 13px 13px 69px; color: var(--muted); font-size: 12.5px; }
    .match.open .detail { display: block; }
    .match.open .match__main { background: var(--card-hi); }
    .detail .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(52px, 1fr)); gap: 6px; margin: 6px 0 10px; max-width: 340px; }
    .setcol { border: 1px solid var(--line); border-radius: 7px; padding: 5px; text-align: center; background: var(--bg-2); }
    .setcol .lbl { font-size: 9px; color: var(--faint); text-transform: uppercase; letter-spacing: .04em; }
    .setcol .val { font-variant-numeric: tabular-nums; font-weight: 700; margin-top: 2px; }
    .detail .kv { display: flex; flex-wrap: wrap; gap: 5px 16px; }
    .detail .kv span b { color: var(--text); font-weight: 600; }
    .detail a.src { display: inline-flex; align-items: center; gap: 5px; margin-top: 9px; color: var(--accent); text-decoration: none; font-weight: 600; }
    .detail a.src:hover { text-decoration: underline; }

    .empty { text-align: center; color: var(--muted); padding: 70px 0; }
    .empty .big { font-size: 34px; margin-bottom: 8px; }
    .skel { height: 60px; border-radius: 12px; background: linear-gradient(90deg, var(--card), var(--card-hi), var(--card)); background-size: 200% 100%; animation: sk 1.2s infinite; margin-bottom: 8px; }
    @keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    @media (max-width: 480px) {
      .brand small { display: none; }
      .detail { padding-left: 13px; }
      .match__main { grid-template-columns: 42px 1fr; }
      .match__main .sets { grid-column: 2; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="topbar">
        <div class="brand">🎾 PadelTicker <small>live padel scores</small></div>
        <div class="refresh" id="refresh"><span class="dot"></span><span id="refresh-txt">—</span></div>
        <button class="theme-btn" id="theme" title="Toggle theme">◐</button>
      </div>
      <div class="tabs" id="tabs">
        <button class="tab active" data-status="all">All</button>
        <button class="tab" data-status="live">🔴 Live <span class="pill" id="livepill" hidden>0</span></button>
        <button class="tab" data-status="upcoming">Upcoming</button>
        <button class="tab" data-status="final">Final</button>
      </div>
      <div class="row2">
        <div class="chips" id="chips"></div>
        <div class="search"><input id="q" type="search" placeholder="Search player or tournament…" autocomplete="off" /></div>
      </div>
    </div>
  </header>

  <main><div class="wrap" id="app"></div></main>
  <script src="app.js"></script>
</body>
</html>
