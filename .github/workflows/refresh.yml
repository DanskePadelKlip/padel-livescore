name: Refresh livescore

# Runs the Playwright-based fetch, then redeploys public/ (with the fresh
# matches.json) to Cloudflare Pages. This is the "browser-capable" runner —
# the fetch needs a real browser (Norway/tournamentsoftware + FIP parsing),
# so it can't run in a plain Cloudflare Worker.
#
# Requires two repo secrets (Settings > Secrets and variables > Actions):
#   CLOUDFLARE_API_TOKEN   — a Cloudflare "Pages: Edit" token
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
#
# NOTE ON COST: GitHub Actions minutes are limited on PRIVATE repos (~2000/mo
# free). Any useful cadence exceeds that — see README "Deploy" for options
# (make the repo public for unlimited minutes, use a self-hosted runner, etc.).

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 min (adjust to taste / budget)
  workflow_dispatch: {} # manual "Run workflow" button

concurrency:
  group: refresh-livescore
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Fetch matches
        run: node scripts/fetch-live.js
      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@4 pages deploy --branch main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
